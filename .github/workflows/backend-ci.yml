name: Backend (Java) CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**' # 🎯 关键：只有 backend 目录下的文件变动时，才触发此流水线
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backend/**' # 🎯 关键：PR 中包含 backend 目录的修改时才触发

jobs:
  java-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # 如果是 gradle 换成 'gradle'

      - name: Run Backend Tests
        # 🎯 关键：指定该任务在 backend 子目录下执行，否则找不到 pom.xml
        working-directory: ./backend 
        run: mvn clean test # 如果是 gradle 换成 ./gradlew build
