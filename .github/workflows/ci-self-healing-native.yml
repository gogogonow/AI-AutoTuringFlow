name: GitHub Native Copilot Auto-Fix

on:
  workflow_run:
    workflows: ["Backend (Java) CI", "Frontend (Node.js) CI"]
    types:
      - completed

jobs:
  copilot-native-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      # 下载上一步失败的日志
      # （此处省略下载日志到 logs.txt 的步骤，可参考之前的官方 Script）

      # 🎯 核心：利用虚拟机原生自带的 gh cli 和官方 copilot 扩展进行诊断
      - name: Use GitHub Native CLI Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 安装官方的 gh copilot 扩展
          gh extension install github/gh-copilot || true
          
          # 2. 纯原生调用：让官方扩展根据日志给出修复建议并尝试应用
          # 利用 gh copilot explain 或 gh copilot suggest 解析错误
          gh copilot explain "The CI failed with these logs. Optimize the code to fix it. Logs: $(cat logs.txt | tail -n 50)" > ai_suggestion.md
          
          # 3. 让原生 AI 尝试直接重写或者生成 Patch 文件
          # （注：gh copilot 目前在 CLI 中主要提供交互引导，如果需要全自动，建议采用下面的方案 B 门禁激活）
