name: GitHub Native Copilot Auto-Fix

on:
  workflow_run:
    workflows: ["Backend (Java) CI", "Frontend (Node.js) CI"] # 监听你前后端对应的 CI 流水线名称
    types:
      - completed

jobs:
  copilot-native-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      actions: read # 🎯 必须显式声明读取上一步 Actions 日志的权限

    steps:
      # 1. 检出触发 CI 的具体开发分支
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      # 2. 🎯 修复“No such file or directory”：利用 GitHub Script 动态抓取失败日志并写入本地
      - name: Download and Truncate Failed CI Logs
        uses: actions/github-script@v7
        id: get-logs
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const repo = context.repo;
            
            // 找出失败的 Job
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: repo.owner,
              repo: repo.repo,
              run_id: runId
            });
            const failedJob = jobs.data.jobs.find(j => j.conclusion === 'failure');
            
            if (failedJob) {
              core.info(`Found failed job: ${failedJob.name}, downloading logs...`);
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: repo.owner,
                repo: repo.repo,
                job_id: failedJob.id
              });
              
              // 将日志截取最后 80 行（防止过长超出 CLI 限制），并安全写入到当前工作目录下的 logs.txt
              const fs = require('fs');
              const logLines = logs.data.split('\n');
              const truncatedLogs = logLines.slice(-80).join('\n');
              fs.writeFileSync('logs.txt', truncatedLogs);
              core.setOutput('failed_job_name', failedJob.name);
            } else {
              core.setFailed('No failed job found in this run.');
            }

      # 3. 安装官方 gh-copilot 扩展并进行身份授权绑定
      - name: Install GitHub Copilot CLI Extension
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 借用环境默认 Token 免去登录
        run: |
          gh extension install github/gh-copilot || true

      # 4. 🎯 彻底修复 Exit code 1：通过管道（Pipeline）安全传递日志流
      - name: Run Native Copilot Troubleshooting
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILED_JOB_NAME: ${{ steps.get-logs.outputs.failed_job_name }}
        run: |
          echo "### 🤖 GitHub Copilot Native Error Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Analyzing failure context for module: **$FAILED_JOB_NAME**..." >> $GITHUB_STEP_SUMMARY
          
          # 1. 先定义清晰的引导指令（不包含日志本体，防止符号冲突）
          INSTRUCTION="You are a senior developer. The CI pipeline failed for the '$FAILED_JOB_NAME' module. Analyze the following trailing log from stdin, pinpoint the exact file and line causing the issue, explain the root cause, and output the correct code snippet to fix it."
          
          # 2. 🎯 核心修正：利用管道符 | 将 logs.txt 的内容作为标准输入喂给 gh copilot
          # 这样大模型就能安全接收到完整的日志上下文，而不会破坏 Bash 命令行结构
          cat logs.txt | gh copilot -p "$INSTRUCTION" >> $GITHUB_STEP_SUMMARY
