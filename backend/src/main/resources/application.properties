# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
# Updated MySQL driver class for Spring Boot 3.x
# Connection values use Railway MySQL plugin env vars (MYSQLHOST / MYSQLPORT / MYSQLDATABASE /
# MYSQLUSER / MYSQLPASSWORD) injected automatically when a MySQL plugin is linked in Railway.
# Fallback values retain original local-dev defaults for docker-compose / local usage.
# createDatabaseIfNotExist=true ensures the database is created if it does not already exist.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:optical_modules}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# ddl-auto=update: Hibernate will automatically create or update tables based on entity definitions.
# Tables are created on first startup; subsequent startups only apply schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Validate migrations before running migrate - set to false to skip validation
spring.flyway.validate-on-migrate=false
# Clean database on validation errors (WARNING: only use in development)
# spring.flyway.clean-disabled=false
# Out of order migrations allowed - useful when working with multiple branches
spring.flyway.out-of-order=true

# Spring SQL Initialization
# DISABLED: Flyway migrations (V1-V8) manage the database schema.
# Using both Flyway and Spring SQL initialization creates conflicts.
# schema.sql is kept for reference but not executed.
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:db/schema.sql
# spring.sql.init.data-locations=classpath:db/data.sql
# spring.sql.init.continue-on-error=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# JWT Configuration
jwt.secret=optical-modules-management-system-jwt-secret-key-minimum-256-bits-for-hs256
jwt.expiration=86400000
