# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
# Updated MySQL driver class for Spring Boot 3.x
# Connection values use Railway MySQL plugin env vars (MYSQLHOST / MYSQLPORT / MYSQLDATABASE /
# MYSQLUSER / MYSQLPASSWORD) injected automatically when a MySQL plugin is linked in Railway.
# Fallback values retain original local-dev defaults for docker-compose / local usage.
# createDatabaseIfNotExist=true ensures the database is created if it does not already exist.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:optical_modules}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# ddl-auto=update: Hibernate will automatically create or update tables based on entity definitions.
# Tables are created on first startup; subsequent startups only apply schema changes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Spring SQL Initialization
# mode=always ensures schema.sql and data.sql are evaluated on every startup.
# Hibernate DDL (ddl-auto=update) runs first, then SQL init scripts run.
# schema.sql uses CREATE TABLE IF NOT EXISTS so it is safe to re-run.
# data.sql uses INSERT IGNORE so duplicate sample rows are silently skipped.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
