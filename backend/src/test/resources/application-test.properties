# Test configuration for Spring Boot 3.2.0 regression tests
# Testing MySQL connector compatibility and Jakarta persistence

# H2 in-memory database for testing (faster than real MySQL)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway disabled for tests (we use ddl-auto=create-drop)
spring.flyway.enabled=false

# JWT Configuration for tests
jwt.secret=test-secret-key-for-testing-purposes-minimum-256-bits-required-for-hs256
jwt.expiration=86400000

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=INFO
logging.level.com.example.backend=DEBUG

# Jackson JSON configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Test-specific settings
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.test.database.replace=none