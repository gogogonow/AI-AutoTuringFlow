# This file is used as an envsubst template by the nginx Docker image.
# At container startup the official /docker-entrypoint.d/20-envsubst-on-templates.sh
# script substitutes environment variables and writes the result to
# /etc/nginx/conf.d/default.conf.
#
# The entrypoint only substitutes variables that exist in the environment,
# so native nginx variables ($host, $uri, $scheme, etc.) are preserved
# because they are lowercase and never appear as OS environment variables.

server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health-check endpoint (used by Railway)
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"UP"}';
    }

    # SPA fallback: serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
