<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光模块管理系统</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header id="header">
        <div class="header-content">
            <h1 class="system-title">光模块管理系统</h1>
            <div class="user-info">
                <span class="user-name">管理员</span>
                <button class="logout-btn">退出</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- 侧边栏菜单 -->
        <aside id="sidebar">
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li class="nav-item active" data-page="list">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">📋</span>
                            <span class="nav-text">光模块列表</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="create">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">➕</span>
                            <span class="nav-text">创建光模块</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 主要内容区域 -->
        <main id="main-content">
            <div id="page-container"></div>
        </main>
    </div>

    <!-- 加载提示 -->
    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script src="js/api.js"></script>
    <script src="js/components/Header.js"></script>
    <script src="js/components/Sidebar.js"></script>
    <script src="js/components/ModuleList.js"></script>
    <script src="js/components/ModuleDetails.js"></script>
    <script src="js/components/ModuleForm.js"></script>
    <script src="js/components/HistoryList.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
