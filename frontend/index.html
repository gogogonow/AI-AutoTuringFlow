<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光模块管理系统</title>
  
  <!-- CSS样式 -->
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/module-list.css">
  <link rel="stylesheet" href="styles/history-list.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <div id="header">
    <div class="header-content">
      <div class="system-title">📦 光模块管理系统</div>
      <div class="user-info">
        <span class="user-name">管理员</span>
        <button class="logout-btn">退出</button>
      </div>
    </div>
  </div>

  <!-- 主布局容器 -->
  <div class="main-container">
    <!-- 左侧导航栏 -->
    <nav id="sidebar">
      <div class="sidebar-nav">
        <ul class="nav-menu">
          <li class="nav-item active" data-page="list">
            <a href="#list" class="nav-link">
              <span class="nav-icon">📋</span>
              <span class="nav-text">光模块列表</span>
            </a>
          </li>
          <li class="nav-item" data-page="create">
            <a href="#create" class="nav-link">
              <span class="nav-icon">➕</span>
              <span class="nav-text">创建光模块</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main id="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- 加载遮罩 -->
  <div id="loading" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
  </div>

  <!-- 消息提示 -->
  <div id="toast" class="toast" style="display:none"></div>

  <!-- JavaScript模块：config → utils → api → components → app -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/Header.js"></script>
  <script src="js/components/Sidebar.js"></script>
  <script src="js/components/ModuleList.js"></script>
  <script src="js/components/ModuleForm.js"></script>
  <script src="js/components/ModuleDetails.js"></script>
  <script src="js/components/HistoryList.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
